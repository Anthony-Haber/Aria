name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        working-directory: real-time/Plugin
        shell: powershell
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: real-time/Plugin
        shell: powershell
        run: cmake --build build --config Release --target AriaBridge_Standalone

      - name: Stage exe
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          $exe = Get-ChildItem -Path "real-time/Plugin/build" -Recurse -Filter "Aria Bridge.exe" |
            Where-Object { $_.FullName -like "*Standalone*" } |
            Select-Object -First 1
          if (-not $exe) { throw "Standalone exe not found." }
          Copy-Item $exe.FullName -Destination "staging/Aria Bridge.exe" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: standalone-exe
          path: staging/Aria Bridge.exe

  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        working-directory: real-time/Plugin
        run: cmake -B build -G Xcode

      - name: Build
        working-directory: real-time/Plugin
        run: cmake --build build --config Release --target AriaBridge_Standalone

      - name: Ad-hoc sign
        working-directory: real-time/Plugin/build/AriaBridge_artefacts/Release/Standalone
        run: codesign --force --deep --sign - "Aria Bridge.app"

      - name: Zip app bundle
        working-directory: real-time/Plugin/build/AriaBridge_artefacts/Release/Standalone
        run: ditto -c -k --sequesterRsrc --keepParent "Aria Bridge.app" "Aria Bridge.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: standalone-mac
          path: real-time/Plugin/build/AriaBridge_artefacts/Release/Standalone/Aria Bridge.zip

  package-windows:
    runs-on: windows-latest
    needs: build-windows

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: standalone-exe
          path: staging

      - name: Build package structure
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "staging\models" | Out-Null
          New-Item -ItemType Directory -Force -Path "staging\backend" | Out-Null

          Copy-Item "install.bat" "staging\install.bat" -Force
          Copy-Item "start.bat" "staging\start.bat" -Force
          Copy-Item "README.md" "staging\README.md" -Force

          Set-Content -Path "staging\models\PUT_MODEL_HERE.txt" -Value "Download model-gen.safetensors from https://huggingface.co/eleutherai/aria and place it in this folder."

          Get-ChildItem "real-time" -Force |
            Where-Object { $_.Name -notin @("Plugin", "build", "__pycache__") } |
            ForEach-Object {
              Copy-Item $_.FullName -Destination "staging\backend" -Recurse -Force
            }

          Copy-Item "aria" "staging\backend\aria" -Recurse -Force
          Copy-Item "config" "staging\backend\config" -Recurse -Force

      - name: Zip
        shell: powershell
        run: |
          $zip = "aria-bridge-windows-${{ github.ref_name }}.zip"
          Compress-Archive -Path "staging\*" -DestinationPath $zip

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: aria-bridge-windows-${{ github.ref_name }}.zip

  package-mac:
    runs-on: macos-latest
    needs: build-mac

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: standalone-mac
          path: app-download

      - name: Build package structure
        run: |
          mkdir -p staging/models staging/backend

          ditto -x -k "app-download/Aria Bridge.zip" staging/

          # Inject start.sh into the app bundle and make it executable
          cp start.sh "staging/Aria Bridge.app/Contents/MacOS/start.sh"
          chmod +x "staging/Aria Bridge.app/Contents/MacOS/start.sh"

          cp install.sh staging/install.sh
          chmod +x staging/install.sh
          cp README.md staging/README.md
          printf "Download model-gen.safetensors from https://huggingface.co/eleutherai/aria and place it in this folder." \
            > "staging/models/PUT_MODEL_HERE.txt"

          find real-time -maxdepth 1 -mindepth 1 | while read -r item; do
            name=$(basename "$item")
            if [[ "$name" != "Plugin" && "$name" != "build" && "$name" != "__pycache__" ]]; then
              cp -r "$item" staging/backend/
            fi
          done

          cp -r aria staging/backend/aria
          cp -r config staging/backend/config

      - name: Zip
        run: |
          cd staging
          zip -r --symlinks "../aria-bridge-macos-${{ github.ref_name }}.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: aria-bridge-macos-${{ github.ref_name }}.zip

  release:
    runs-on: ubuntu-latest
    needs: [package-windows, package-mac]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: release-mac
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            aria-bridge-windows-${{ github.ref_name }}.zip
            aria-bridge-macos-${{ github.ref_name }}.zip
          body: See README.md for installation instructions.
